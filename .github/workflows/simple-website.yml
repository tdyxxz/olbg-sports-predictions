name: Simple Website Deployment

on:
  schedule:
    # Run daily at 9:00 AM PST (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-website:
    runs-on: windows-2025
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Generate web predictions
      run: |
        python generate_web_predictions.py
      shell: pwsh
      
    - name: Commit and push website
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html script.js styles.css api/
        git diff --staged --quiet || git commit -m "Update website $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
        git push
      shell: pwsh
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: website-files-${{ github.run_number }}
        path: |
          index.html
          script.js
          styles.css
          api/
        retention-days: 30
