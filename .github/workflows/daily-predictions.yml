name: Daily Sports Predictions

on:
  schedule:
    # Run daily at 9:00 AM PST (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-predictions:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up PowerShell execution policy
      run: Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
      shell: pwsh
      
    - name: Run daily predictions cycle
      run: |
        $date = Get-Date -Format 'yyyy-MM-dd'
        .\run_daily_full_cycle.ps1 -Date $date
      shell: pwsh
      
    - name: Upload prediction results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: prediction-results-${{ github.run_number }}
        path: |
          WRITTEN PREDICTIONS/
          outputs/
          *.json
          *.md
        retention-days: 30
        
    - name: Commit and push any changes
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "Daily predictions $(Get-Date -Format 'yyyy-MM-dd')"
        git push
      shell: pwsh
