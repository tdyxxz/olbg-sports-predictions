name: Daily Sports Predictions

on:
  schedule:
    # Run daily at 9:00 AM PST (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-predictions:
    runs-on: windows-2025
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up PowerShell execution policy
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
        Get-ExecutionPolicy
      shell: pwsh
      
    - name: Check repository structure
      run: |
        Get-ChildItem -Force
        if (Test-Path "run_daily_full_cycle.ps1") {
          Write-Host "PowerShell script found"
        } else {
          Write-Host "PowerShell script not found"
          exit 1
        }
      shell: pwsh
      
    - name: Run daily predictions cycle
      run: |
        $date = Get-Date -Format 'yyyy-MM-dd'
        Write-Host "Running predictions for date: $date"
        try {
          & .\run_daily_full_cycle.ps1 -Date $date
          Write-Host "Predictions completed successfully"
        } catch {
          Write-Host "Error running predictions: $_"
          exit 1
        }
      shell: pwsh
      
    - name: Upload prediction results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: prediction-results-${{ github.run_number }}
        path: |
          WRITTEN PREDICTIONS/
          outputs/
          *.json
          *.md
        retention-days: 30
        
    - name: Commit and push any changes
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "Daily predictions $(Get-Date -Format 'yyyy-MM-dd')"
        git push
      shell: pwsh
